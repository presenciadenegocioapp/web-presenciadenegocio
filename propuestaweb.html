<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Propuesta Web | Presencia de Negocio</title>
  <meta
    name="description"
    content="Consulta de forma clara nuestra propuesta web, qué incluye cada opción y cómo trabajamos en Presencia de Negocio."
  />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="Presencia de Negocio" />
  <meta name="theme-color" content="#2563eb" />

  <link rel="icon" href="favicon.png" sizes="32x32">
  <link rel="icon" href="favicon.png" sizes="16x16">
  <link rel="apple-touch-icon" href="favicon.png">

  <link rel="canonical" href="https://presenciadenegocioapp.github.io/propuestaweb/" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_ES" />
  <meta property="og:site_name" content="Presencia de Negocio" />
  <meta property="og:title" content="Propuesta Web | Presencia de Negocio" />
  <meta
    property="og:description"
    content="Te dejamos aquí una propuesta clara para que puedas ver cómo trabajamos, qué incluye cada opción y los precios."
  />
  <meta property="og:url" content="https://presenciadenegocioapp.github.io/propuestaweb/" />
  <meta property="og:image" content="https://presenciadenegocioapp.github.io/propuestaweb/propuesta.png" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Propuesta Web | Presencia de Negocio" />
  <meta
    name="twitter:description"
    content="Consulta nuestra propuesta web de forma clara, simple y sin complicaciones."
  />
  <meta name="twitter:image" content="https://presenciadenegocioapp.github.io/propuestaweb/propuesta.png" />

  <style>
    :root {
      --color-fondo-principal: #ffffff;
      --color-fondo-secundario: #f6f8fb;
      --color-fondo-terciario: #eef3ff;
      --color-fondo-oscuro: #0b1220;
      --color-fondo-card: rgba(255, 255, 255, 0.92);
      --color-fondo-destacado: #2563eb;
      --color-fondo-acento: #7c3aed;
      --color-fondo-borde-suave: #e5e7eb;
      --color-fondo-borde-fuerte: #cfd8e3;

      --color-texto-principal: #111827;
      --color-texto-secundario: #4b5563;
      --color-texto-suave: #6b7280;
      --color-texto-claro: #cbd5e1;
      --color-texto-blanco: #ffffff;
      --color-texto-destacado: #2563eb;
      --color-texto-acento: #7c3aed;
      --color-texto-oscuro: #0b1220;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28%),
        radial-gradient(circle at top right, rgba(124, 58, 237, 0.08), transparent 24%),
        var(--color-fondo-principal);
      color: var(--color-texto-principal);
    }

    .container {
      width: min(1100px, 92%);
      margin: 0 auto;
    }

    /* HEADER */
    .header {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(229, 231, 235, 0.7);
    }

    .header-container {
      min-height: 78px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.35rem;
      font-weight: 900;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .logo-text span {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-icon {
      height: 36px;
    }

    .nav {
      display: flex;
      gap: 14px;
    }

    .nav a {
      font-size: 0.95rem;
      font-weight: 600;
    }

    /* HERO */
    .hero {
      padding: 88px 0 54px;
      text-align: center;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 18px;
    }

    .hero-description {
      max-width: 800px;
      margin: 0 auto 26px;
      color: #4b5563;
    }

    .btn {
      padding: 14px 22px;
      border-radius: 14px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, #2563eb, #7c3aed);
      color: white;
    }

    .btn-secondary {
      background: white;
      border: 1px solid #e5e7eb;
    }

    .hero-buttons {
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* PROPUESTA */
    .propuesta-section {
      padding: 28px 0 84px;
    }

    .propuesta-card {
      border-radius: 28px;
      overflow: hidden;
    }

    .propuesta-card img {
      width: 100%;
      border-radius: 18px;
    }

    /* RESPONSIVE */
    @media (max-width: 760px) {
      .header-container {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .logo-icon {
        height: 28px;
      }

      .hero h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

<header class="header">
  <div class="container header-container">
    <a href="#" class="logo">
      <span class="logo-text">Presencia<span>DeNegocio</span></span>
      <img src="logo-basico.png" class="logo-icon">
    </a>

    <nav class="nav">
      <a href="https://presenciadenegocioapp.github.io/web-presenciadenegocio/index.html" target="_blank">Ir a la web</a>
      <a href="https://presenciadenegocioapp.github.io/web-presenciadenegocio/contacta.html" target="_blank">Contactar</a>
    </nav>
  </div>
</header>

<main>

<section class="hero">
  <div class="container">
    <h1>Una propuesta clara, profesional y sin complicaciones</h1>

    <p class="hero-description">
      Te dejamos aquí un resumen visual para entender cómo trabajamos y qué incluye cada opción.
    </p>

    <div class="hero-buttons">
      <a href="https://presenciadenegocioapp.github.io/web-presenciadenegocio/contacta.html" target="_blank" class="btn btn-primary">
        Hablar sobre mi caso
      </a>

      <a href="#propuesta" class="btn btn-secondary">
        Ver propuesta
      </a>
    </div>
  </div>
</section>

<section class="propuesta-section" id="propuesta">
  <div class="container">
    <div class="propuesta-card">
      <img src="propuesta.png">
    </div>
  </div>
</section>

</main>

</body>
</html>
