<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Contacta | Presencia de Negocio</title>

  <meta name="description" content="Contacta con nosotros y te ayudamos a crear una web clara, profesional y accesible para tu negocio." />

  <style>
    :root {
      --color-azul: #2563eb;
      --color-lila: #7c3aed;
      --color-texto: #111827;
      --color-secundario: #4b5563;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(37, 99, 235, 0.08), transparent 28%),
        radial-gradient(circle at bottom right, rgba(124, 58, 237, 0.08), transparent 28%),
        #ffffff;
      color: var(--color-texto);
    }

    .container {
      width: min(1100px, 92%);
      margin: auto;
    }

    /* HEADER */
    .header {
      padding: 20px 0;
      border-bottom: 1px solid #e5e7eb;
    }

    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 900;
      font-size: 1.3rem;
    }

    .logo span {
      background: linear-gradient(135deg, var(--color-azul), var(--color-lila));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .nav-links a {
      margin-left: 18px;
      font-weight: 600;
      color: var(--color-texto);
      text-decoration: none;
    }

    .nav-links a:hover {
      color: var(--color-azul);
    }

    /* HERO */
    .hero {
      padding: 80px 0 50px;
      text-align: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 15px;
    }

    .hero p {
      color: var(--color-secundario);
      max-width: 600px;
      margin: auto;
    }

    /* FORM */
    .form-section {
      padding: 40px 0 80px;
    }

    .form-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.05);
      border: 1px solid #e5e7eb;
      max-width: 600px;
      margin: auto;
    }

    .form-card h2 {
      margin-bottom: 10px;
    }

    .form-card p {
      color: var(--color-secundario);
      margin-bottom: 20px;
    }

    .form {
      display: grid;
      gap: 14px;
    }

    input, textarea, select {
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #d1d5db;
      font-family: inherit;
    }

    textarea {
      min-height: 140px;
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--color-azul);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .btn {
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      background: linear-gradient(135deg, var(--color-azul), var(--color-lila));
      color: white;
      transition: 0.25s;
    }

    .btn:hover {
      transform: translateY(-2px);
    }

    .footer {
      padding: 30px 0;
      text-align: center;
      border-top: 1px solid #e5e7eb;
      color: #6b7280;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="container nav">
      <div class="logo">Presencia<span>DeNegocio</span></div>

      <div class="nav-links">
        <a href="index.html">Inicio</a>
        <a href="sobre-nosotros.html">Sobre nosotros</a>
        <a href="contacta.html">Contacta</a>
      </div>
    </div>
  </header>

  <!-- HERO -->
  <section class="hero">
    <div class="container">
      <h1>Contacta con nosotros</h1>
      <p>
        Cuéntanos qué necesitas y te ayudaremos a entender qué tipo de web encaja mejor con tu negocio.
      </p>
    </div>
  </section>

  <!-- FORMULARIO -->
  <section class="form-section">
    <div class="container">
      <div class="form-card">

        <h2>Escríbenos</h2>
        <p>Te responderemos lo antes posible.</p>

        <form id="form" action="https://formsubmit.co/aqui-va-tu-mail@gmail.com" method="POST" class="form">

          <input type="text" name="nombre" placeholder="Nombre" required>
          <input type="email" name="email" placeholder="Email" required>

          <select name="interes" required>
            <option value="">¿Qué necesitas?</option>
            <option>Crear web</option>
            <option>Información</option>
            <option>Dudas</option>
          </select>

          <textarea name="mensaje" placeholder="Cuéntanos tu caso"></textarea>

          <!-- CONFIG FORM SUBMIT -->
          <input type="hidden" name="_captcha" value="false">
          <input type="hidden" name="_next" value="mensaje-enviado.html">
          <input type="hidden" name="_subject" value="Nuevo contacto web">

          <button type="submit" class="btn">Enviar mensaje</button>

        </form>

      </div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <p>© Presencia de Negocio</p>
  </footer>

  <script>
    document.getElementById('form').addEventListener('submit', function(e){
      const email = this.querySelector('input[name="email"]').value;

      if(!email.includes("@")){
        e.preventDefault();
        alert("Introduce un email válido");
      }
    });
  </script>

</body>
</html>
